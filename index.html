  <!-- MSG91 OTP Widget Integration -->
  <script type="text/javascript">
    var configuration = {
      widgetId: "36624272444f333931393831",
      tokenAuth: "497026TZDdbCze69a336a2P1",
      exposeMethods: true, // Required for custom UI integration
      success: (data) => {
        console.log('MSG91 Success:', data);
        // Notify the app about success
        window.dispatchEvent(new CustomEvent('msg91-otp-success', {
          detail: data
        }));
      },
      failure: (error) => {
        console.log('MSG91 Failure:', error);
        // Notify the app about failure
        window.dispatchEvent(new CustomEvent('msg91-otp-failure', {
          detail: error
        }));
      },
    };
    // Ensure compatibility with existing service
    window.msg91Config = configuration;
  </script>

  <script type="text/javascript">
    (function loadOtpScript(urls) {
      let i = 0;

      function attempt() {
        console.log(`[MSG91] Attempting to load from: ${urls[i]}`);
        const s = document.createElement('script');
        s.src = urls[i];
        s.async = true;
        s.onload = () => {
          if (typeof window.initSendOTP === 'function') {
            window.initSendOTP(configuration);
            console.log('[MSG91] OTP Provider initialized');
          }
        };
        s.onerror = () => {
          i++;
          if (i < urls.length) {
            attempt();
          } else {
            console.error('[MSG91] Failed to load OTP script');
          }
        };
        document.head.appendChild(s);
      }
      attempt();
    })([
      'https://verify.msg91.com/otp-provider.js',
      'https://verify.phone91.com/otp-provider.js'
    ]);
  </script>
